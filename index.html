<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <title>St. Paddy Pub Crawl</title>
</head>

<body>

  <div class="clover-bg"></div>

  <header>
    <img src="logo.png" alt="St. Paddy Pub Crawl logo" class="logo">
    <h1>St. Paddy Pub Crawl</h1>
    <p class="tagline">Downtown Delaware &mdash; Find Your Shamrocks</p>
  </header>

  <div class="main-content">

    <div class="card">
      <div class="card-header">
        <h2>Your Info</h2>
      </div>

      <div class="field">
        <label for="username">Full Name</label>
        <input type="text" id="username" name="username" placeholder="Enter your full name" required>
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Shamrock Numbers</h2>
      </div>

      <div class="field">
        <label for="shamrock-location">Location</label>
        <select id="shamrock-location"></select>
      </div>

      <p class="scroll-hint">Enter up to 10 shamrock numbers (0–120)</p>
      <div class="shamrock-scroll" id="shamrock-list"></div>
    </div>

  </div>

  <div class="submit-row">
    <button id="submit-btn">Submit &rarr;</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
