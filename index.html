<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Just a Website</title>
</head>

<body>
    <!--This is for the top bar of the website CREATE TRAVERSAL WESBITR SHAMROCK, send to a google spreadsheet user info, change domain-->

        <img src="logo.png" alt="Shamrock logo" class="responsive-img" height="300" width="300">
        <h1>St. Paddy Pub Crawl</h1>

    <div class="main-content">
        <div class="container-left">
            <h2>Info</h2>
            <form id="userForm">
                <label for="username">Full Name:</label>
                <input type="text" id="username" name="username" placeholder="Enter your full name" required><br></br>
                <label for="phone">Phone Number:</label>
                <input type="text" id="phone" name="phone" placeholder="Enter a phone number" required><br></br>
                <select name="location" id="location" required>
                <!--Do not select anything-->
                    <option value="location0">Backstretch</option>
                    <option value="location1">Barley Hopsters</option>
                    <option value="location2">Buns</option>
                    <option value="location3">Hamburger Inn</option>
                    <option value="location4">Oak and Brazen</option>
                    <option value="location5">Old Dog</option>
                    <option value="location6">Opa</option>
                    <option value="location7">Restoration</option>
                    <option value="location8">Roops</option>
                    <option value="location9">Solar Saloon</option>
                    <option value="location10">Son of Thurmans</option>
                    <option value="location11">Staas Brewing</option>
                </select>
            </form>
        </div>
        <div class="container-right">
            <h2>Shamrocks</h2>
            <h3 id="location">location</h3>
            <ul class="input-field">
                <!--Do not select anything-->
                <input type ="text" maxlength="3" id="shamrock0" name="shamrock0" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock1" name="shamrock1" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock2" name="shamrock2" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock3" name="shamrock3" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock4" name="shamrock4" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock5" name="shamrock5" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock6" name="shamrock6" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock7" name="shamrock7" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock8" name="shamrock8" placeholder="Enter a Shamrock #" required>
                <input type ="text" maxlength="3" id="shamrock9" name="shamrock9" placeholder="Enter a Shamrock #" required>
            </ul>
        </div>
    </div>
    <input id="submit" form="userForm"type="submit" value="Submit">
    <script src="script.js"></script>
</body>

</html>
